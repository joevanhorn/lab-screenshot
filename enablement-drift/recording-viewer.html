<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drift Detection — Session Recording</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; }
  header { padding: 10px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 14px; font-weight: 600; }
  header .meta { font-size: 12px; color: #94a3b8; }
  main { flex: 1; display: flex; min-height: 0; }
  .video-pane { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 12px; min-width: 0; }
  video { max-width: 100%; max-height: 100%; background: #000; }
  .log-pane { width: 480px; min-width: 360px; max-width: 50vw; resize: horizontal; overflow: auto; background: #1e293b; border-left: 1px solid #334155; }
  .log-entry { padding: 6px 12px; border-bottom: 1px solid #334155; cursor: pointer; font-size: 12px; line-height: 1.5; transition: background 80ms; }
  .log-entry:hover { background: #334155; }
  .log-entry.active { background: #2563eb; color: #fff; }
  .log-entry.active .t { color: #bfdbfe; }
  .log-entry .t { display: inline-block; width: 56px; color: #64748b; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
  .log-entry .lvl { display: inline-block; width: 56px; color: #94a3b8; font-size: 10px; text-transform: uppercase; }
  .log-entry .lvl.error { color: #f87171; }
  .log-entry .lvl.agent { color: #34d399; }
  .log-entry .msg { color: inherit; }
</style>
</head>
<body>
<header>
  <h1>🔎 Drift Detection — Session Recording</h1>
  <span class="meta">Click any log row to jump the video to that moment</span>
</header>
<main>
  <div class="video-pane">
    <video id="player" controls></video>
  </div>
  <div class="log-pane" id="log-pane"></div>
</main>
<script>
const VIDEO_SRC = "drift-detection-demo.webm";
const LOG = [{"t": 0.0, "level": "agent", "message": "Authenticating to Okta admin console..."}, {"t": 28.2, "level": "agent", "message": "✅ Authenticated to https://taskvantage-admin.okta.com"}, {"t": 28.2, "level": "agent", "message": "📖 Step step-1: Navigate to Access Certifications via Identity Governance in the left sidebar"}, {"t": 28.2, "level": "agent", "message": "🧭 Navigating: Identity Governance > Access Certifications"}, {"t": 40.2, "level": "agent", "message": "📸 Captured 63 UI elements at https://taskvantage-admin.okta.com/admin/dashboard"}, {"t": 40.2, "level": "error", "message": "  ❌ Missing: \"Identity Governance\""}, {"t": 40.2, "level": "error", "message": "  ❌ Missing: \"Access Certifications\""}, {"t": 40.2, "level": "error", "message": "  ❌ Missing: \"Access Certifications\""}, {"t": 40.2, "level": "agent", "message": "📖 Step step-2: View active campaigns by clicking the Campaigns tab and locating the Create campaign button"}, {"t": 40.2, "level": "agent", "message": "🧭 Navigating: Identity Governance > Access Certifications > Campaigns"}, {"t": 54.9, "level": "agent", "message": "📸 Captured 55 UI elements at https://taskvantage-admin.okta.com/admin/governance/campaigns/active"}, {"t": 54.9, "level": "error", "message": "  ❌ Missing: \"Campaigns\""}, {"t": 54.9, "level": "info", "message": "  ✅ Found: \"Certification campaigns\""}, {"t": 54.9, "level": "info", "message": "  ✅ Found: \"Create campaign\""}, {"t": 54.9, "level": "agent", "message": "📖 Step step-3: Click an active campaign to review its details including review progress and action options"}, {"t": 54.9, "level": "agent", "message": "🧭 Navigating: Identity Governance > Access Certifications > Campaigns > <active campaign>"}, {"t": 100.7, "level": "agent", "message": "📸 Captured 2 UI elements at https://taskvantage-admin.okta.com/admin/identity-governance/%3Cactive-campaign%3E"}, {"t": 100.7, "level": "error", "message": "  ❌ Missing: \"Review progress\""}, {"t": 100.7, "level": "error", "message": "  ❌ Missing: \"Pending reviews\""}, {"t": 100.7, "level": "error", "message": "  ❌ Missing: \"Approved\""}, {"t": 100.7, "level": "error", "message": "  ❌ Missing: \"Revoked\""}, {"t": 100.7, "level": "error", "message": "  ❌ Missing: \"End campaign\""}, {"t": 100.7, "level": "agent", "message": "📖 Step step-4: Click the Preconfigured campaigns tab to view certification templates"}, {"t": 100.7, "level": "agent", "message": "🧭 Navigating: Identity Governance > Access Certifications > Preconfigured campaigns"}, {"t": 116.8, "level": "agent", "message": "📸 Captured 2 UI elements at https://taskvantage-admin.okta.com/admin/identity-governance/preconfigured-campaigns"}, {"t": 116.8, "level": "error", "message": "  ❌ Missing: \"Preconfigured campaigns\""}, {"t": 116.8, "level": "agent", "message": "📖 Step step-5: Click the Security access reviews tab to view privileged access review options"}, {"t": 116.8, "level": "agent", "message": "🧭 Navigating: Identity Governance > Access Certifications > Security access reviews"}, {"t": 132.8, "level": "agent", "message": "📸 Captured 2 UI elements at https://taskvantage-admin.okta.com/admin/identity-governance/security-access-reviews"}, {"t": 132.8, "level": "error", "message": "  ❌ Missing: \"Security access reviews\""}, {"t": 133.2, "level": "agent", "message": "🎬 Video saved: /home/ubuntu/lab-screenshot/runs/test-204400/drift-detection-demo.webm"}];

const player = document.getElementById('player');
const pane = document.getElementById('log-pane');

player.src = VIDEO_SRC;

function fmtTime(s) {
  if (s == null) return '--:--';
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  return String(m).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
}

LOG.forEach((e, i) => {
  const row = document.createElement('div');
  row.className = 'log-entry';
  row.dataset.idx = i;
  row.dataset.t = e.t;
  row.innerHTML = '<span class="t">' + fmtTime(e.t) + '</span>'
    + '<span class="lvl ' + (e.level || 'info') + '">' + (e.level || 'info') + '</span>'
    + '<span class="msg"></span>';
  row.querySelector('.msg').textContent = e.message;
  row.addEventListener('click', () => {
    if (player.src) { player.currentTime = e.t; player.play(); }
  });
  pane.appendChild(row);
});

player.addEventListener('timeupdate', () => {
  const t = player.currentTime;
  const rows = pane.querySelectorAll('.log-entry');
  let active = -1;
  for (let i = 0; i < rows.length; i++) {
    if (parseFloat(rows[i].dataset.t) <= t) active = i; else break;
  }
  rows.forEach((r, i) => r.classList.toggle('active', i === active));
  if (active >= 0) {
    const row = rows[active];
    const r = row.getBoundingClientRect();
    const p = pane.getBoundingClientRect();
    if (r.top < p.top || r.bottom > p.bottom) {
      row.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }
});
</script>
</body>
</html>
