expectations:
- step_id: step-1
  description: Navigate to Access Certifications via Identity Governance in the left
    sidebar
  navigation:
  - Identity Governance
  - Access Certifications
  url_hint: https://taskvantage-admin.okta.com
  labels:
  - text: Identity Governance
    locator_hint: left sidebar menu item
    semantic_role: other
  - text: Access Certifications
    locator_hint: left sidebar menu item or page header
    semantic_role: other
  - text: Access Certifications
    locator_hint: page header
    semantic_role: section_header
  source_text: In the Okta Admin Console, navigate to **Identity Governance** in the
    left sidebar. Click on **Access Certifications** to open the certification management
    page. You should see the **Access Certifications** page header
- step_id: step-2
  description: View active campaigns by clicking the Campaigns tab and locating the
    Create campaign button
  navigation:
  - Identity Governance
  - Access Certifications
  - Campaigns
  url_hint: ''
  labels:
  - text: Campaigns
    locator_hint: tab
    semantic_role: tab
  - text: Certification campaigns
    locator_hint: list section header or label
    semantic_role: section_header
  - text: Create campaign
    locator_hint: button at top of page
    semantic_role: button
  source_text: Click on the **Campaigns** tab. You should see a list of **Certification
    campaigns** with their status. The page should show active, scheduled, and completed
    campaigns. Look for the **Create campaign** button at the top of the page
- step_id: step-3
  description: Click an active campaign to review its details including review progress
    and action options
  navigation:
  - Identity Governance
  - Access Certifications
  - Campaigns
  - <active campaign>
  url_hint: ''
  labels:
  - text: Review progress
    locator_hint: summary section header
    semantic_role: section_header
  - text: Pending reviews
    locator_hint: statistic label
    semantic_role: other
  - text: Approved
    locator_hint: statistic label
    semantic_role: other
  - text: Revoked
    locator_hint: statistic label
    semantic_role: other
  - text: End campaign
    locator_hint: campaign actions option
    semantic_role: button
  source_text: Click on any active campaign to view its details. You should see the
    campaign's **Review progress** summary. The campaign detail page shows the number
    of **Pending reviews**, **Approved** items, and **Revoked** items. Look for the
    **End campaign** option in the campaign actions
- step_id: step-4
  description: Click the Preconfigured campaigns tab to view certification templates
  navigation:
  - Identity Governance
  - Access Certifications
  - Preconfigured campaigns
  url_hint: ''
  labels:
  - text: Preconfigured campaigns
    locator_hint: tab
    semantic_role: tab
  source_text: Click on the **Preconfigured campaigns** tab. You should see templates
    for common certification scenarios. The page lists preconfigured campaign types
    with descriptions
- step_id: step-5
  description: Click the Security access reviews tab to view privileged access review
    options
  navigation:
  - Identity Governance
  - Access Certifications
  - Security access reviews
  url_hint: ''
  labels:
  - text: Security access reviews
    locator_hint: tab
    semantic_role: tab
  source_text: Click on the **Security access reviews** tab. You should see options
    for security-focused access reviews. This section helps identify and review privileged
    access across the organization
